name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v3

     - name: Setup SSH (Debug)
        run: |
            set -x
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
            echo "==== FILE CONTENT ===="
            cat ~/.ssh/id_ed25519
            echo "==== PERMISSIONS ===="
            ls -la ~/.ssh
            chmod 600 ~/.ssh/id_ed25519
            ssh-keyscan -H 209.38.35.216 >> ~/.ssh/known_hosts
            echo "==== DONE SSH SETUP ===="

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no ahmed@209.38.35.216 "echo CONNECTED"

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ahmed@209.38.35.216 << EOF
            set -e
            cd /var/www/shopping_project
            git pull origin main
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            echo "Deployment done!"
          EOF
