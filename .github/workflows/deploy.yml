name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key correctly
          cat << 'EOF' > ~/.ssh/id_ed25519
${{ secrets.SSH_PRIVATE_KEY }}
EOF

          chmod 600 ~/.ssh/id_ed25519

          # Add server to known hosts
          ssh-keyscan -H 209.38.35.216 >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no ahmed@209.38.35.216 "echo CONNECTED"

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ahmed@209.38.35.216 << 'EOF'
            set -e

            cd /var/www/shopping_project

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "🛠 Running migrations..."
            php artisan migrate --force

            echo "🚀 Deployment done!"
          EOF