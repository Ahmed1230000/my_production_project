name: Deploy Laravel App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 -H 209.38.35.216 >> ~/.ssh/known_hosts

      - name: Deploy to Server
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=no ahmed@209.38.35.216 << 'EOF'
            set -e

            cd /var/www/my_production_project

            echo "🔐 Fix git safe directory..."
            git config --global --add safe.directory /var/www/my_production_project

            echo "🔧 Fix permissions for git..."
            sudo chown -R ahmed:www-data /var/www/my_production_project
            sudo chmod -R 775 /var/www/my_production_project

            echo "📦 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "🛠 Running migrations..."
            php artisan migrate --force

            echo "⚡ Caching..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🔐 Fix runtime permissions..."
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            sudo chmod 600 storage/oauth-*.key

            echo "🚀 Deployment done!"
          EOF
